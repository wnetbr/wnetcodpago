<!DOCTYPE html><html><head><style>body { background: #fff; color: #1d1d1f; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, sans-serif; margin: 0; }
.container { text-align: center; border: 1px solid #d2d2d7; padding: 3rem; border-radius: 30px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
button { background: #007aff; color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 500; cursor: pointer; margin-top: 20px; transition: 0.2s; }
button:hover { opacity: 0.8; }</style></head><body><!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WnetStudio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f5f5f7;
            --panel: rgba(255, 255, 255, 0.7);
            --accent: #007aff; /* Apple Blue */
            --border: rgba(0, 0, 0, 0.1);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
        }

        body { 
            background: var(--bg);
            color: var(--text-primary); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Efeito Frosted Glass Apple */
        .apple-glass {
            background: var(--panel);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .monaco-editor, .monaco-editor .margin, .monaco-editor-background {
            background-color: transparent !important;
        }

        #preview-container {
            position: relative;
            background: #ffffff;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* Phone Decor (iPhone Style) */
        .phone-notch {
            display: none;
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 25px;
            background: #000;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 20;
        }

        /* Desktop Browser Header (Safari Style) */
        .browser-header {
            display: none;
            height: 38px;
            background: #f1f1f1;
            border-bottom: 1px solid #e5e5e5;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        /* Botões de Tab */
        .tab-btn { 
            position: relative; 
            transition: all 0.2s ease; 
            font-size: 13px; 
            font-weight: 500;
            color: var(--text-secondary);
        }
        .tab-btn.active { color: var(--text-primary); }
        .tab-btn.active::after { 
            content: ''; 
            position: absolute; 
            bottom: -8px; left: 0; 
            width: 100%; height: 2px; 
            background: var(--text-primary); 
            border-radius: 2px; 
        }

        /* Botões de Ação */
        .btn-apple {
            background: #ffffff;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            color: #1d1d1f;
            transition: all 0.2s;
        }
        .btn-apple:hover { background: #f5f5f7; border-color: #86868b; }
        
        .btn-primary-apple {
            background: var(--accent);
            color: white;
            border-radius: 8px;
            transition: opacity 0.2s;
        }
        .btn-primary-apple:hover { opacity: 0.9; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 10px; border: 2px solid var(--bg); }

        /* Auth Screen Apple Style */
        #auth-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease-in-out;
        }
        .auth-card {
            width: 320px;
            text-align: center;
        }
        .auth-input {
            width: 100%;
            background: #f5f5f7;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            padding: 12px;
            color: #000;
            text-align: center;
            font-size: 1rem;
            margin: 24px 0;
            outline: none;
        }
        .auth-input:focus { border-color: var(--accent); ring: 2px var(--accent); }

        /* ESTILO DO BANNER DE VENDA (Fiel ao seu design) */
        #paywall-overlay {
            position: fixed;
            inset: 0;
            z-index: 10001;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.4s;
        }
    </style>
</head>
<body class="flex flex-col">

    <div id="paywall-overlay">
        <div class="apple-glass p-10 rounded-[35px] border border-gray-200 text-center max-w-sm shadow-2xl">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg">
                <svg width="32" height="32" viewBox="0 0 256 256" fill="white"><path d="M224,128v80a16,16,0,0,1-16,16H48a16,16,0,0,1-16-16V128a16,16,0,0,1,16-16H80a8,8,0,0,1,0,16H48v80H208V128H176a8,8,0,0,1,0-16h32A16,16,0,0,1,224,128ZM122.34,34.34a8,8,0,0,0-11.32,0l-40,40a8,8,0,0,0,11.32,11.32L112,56.63V160a8,8,0,0,0,16,0V56.63l29.66,29.03a8,8,0,0,0,11.32-11.32Z"></path></svg>
            </div>
            <h2 class="text-xl font-bold text-black">Exportação Bloqueada</h2>
            <p class="text-gray-500 text-xs mt-3 mb-8">Para baixar seu arquivo .html, adquira a versão premium do <b>wnet</b>.</p>
            <button onclick="window.open('https://seulink.com', '_blank')" class="w-full py-3 btn-primary-apple font-semibold">Comprar Agora</button>
            <button onclick="document.getElementById('paywall-overlay').style.display='none'" class="w-full py-3 mt-2 text-xs text-gray-400 hover:text-black transition-all">Voltar para o editor</button>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="w-20 h-20 bg-black rounded-[22%] mx-auto mb-8 flex items-center justify-center shadow-xl">
                <svg width="40" height="40" viewBox="0 0 256 256" fill="white"><path d="M208,80H176V56a48,48,0,0,0-96,0V80H48A16,16,0,0,0,32,96V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V96A16,16,0,0,0,208,80ZM96,56a32,32,0,0,1,64,0V80H96ZM208,208H48V96H208V208Z"></path></svg>
            </div>
            <h2 class="text-black font-semibold text-2xl tracking-tight">Iniciar Sessão</h2>
            <p class="text-gray-500 text-sm mt-1">Digite a senha de Acesso</p>
            
            <input type="password" id="passInput" class="auth-input" placeholder="Senha" maxlength="20">
            
            <button onclick="validateAuth()" class="w-full py-3 btn-primary-apple font-medium">Entrar</button>
            <p id="error-msg" class="text-red-500 text-xs mt-4 opacity-0">Senha incorreta. Tente novamente.</p>
        </div>
    </div>

    <header class="h-16 flex items-center justify-between px-8 border-b border-gray-200 z-50 apple-glass">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-2 group cursor-pointer">
                <div class="h-7 w-7 bg-black rounded-lg flex items-center justify-center">
                    <div class="h-2 w-2 bg-white rounded-full"></div>
                </div>
                <h1 class="text-sm font-semibold tracking-tight text-black">WNET<span class="font-normal opacity-50">Studio</span></h1>
            </div>
            
            <nav class="flex gap-8 items-center pt-1">
                <button onclick="switchTab('html')" id="tab-html" class="tab-btn active uppercase tracking-wider">HTML</button>
                <button onclick="switchTab('css')" id="tab-css" class="tab-btn uppercase tracking-wider">CSS</button>
                <button onclick="switchTab('javascript')" id="tab-js" class="tab-btn uppercase tracking-wider">JS</button>
            </nav>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="selectAllCode()" class="text-xs font-medium px-4 py-2 btn-apple">Selecionar</button>
            <button onclick="clearAll()" class="text-xs font-medium px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg transition-all">Limpar</button>
            <button onclick="importFile()" class="text-xs font-medium px-4 py-2 btn-apple">Importar</button>
            <button onclick="saveToLocal()" class="text-xs font-medium px-4 py-2 btn-apple">Salvar</button>
            <button onclick="downloadBundle()" class="text-xs font-semibold px-5 py-2 btn-primary-apple shadow-lg shadow-blue-500/20">Exportar HTML</button>
            <input type="file" id="fileInput" class="hidden" accept=".html" onchange="handleImport(event)">
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-5 gap-5">
        <section class="w-[45%] apple-glass rounded-2xl flex flex-col p-2 overflow-hidden border border-gray-200">
            <div id="editor-container" class="flex-1 w-full"></div>
            <div class="h-10 border-t border-gray-100 flex items-center px-4 justify-between text-[11px] font-medium text-gray-400">
                <span id="cursor-pos">Linha 1, Coluna 1</span>
                <span>Direito Reservado - WNET</span>
            </div>
        </section>

        <section class="flex-1 flex flex-col gap-4">
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-2 bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100">
                    <div class="h-2 w-2 bg-green-500 rounded-full"></div>
                    <span class="text-[10px] font-bold text-gray-600 uppercase tracking-widest">Online</span>
                </div>
                <div class="flex gap-4 bg-white px-3 py-1.5 rounded-xl border border-gray-100 shadow-sm">
                   <button onclick="toggleFullscreen()" class="opacity-50 hover:opacity-100 transition-opacity"><svg width="16" height="16" fill="#1d1d1f" viewBox="0 0 256 256"><path d="M216,48V88a8,8,0,0,1-16,0V56H168a8,8,0,0,1,0-16h40A8,8,0,0,1,216,48ZM88,200H56V168a8,8,0,0,0-16,0v40a8,8,0,0,0,8,8H88a8,8,0,0,0,0-16Zm120-40a8,8,0,0,0-8,8v32H168a8,8,0,0,0,0,16h40a8,8,0,0,0,8-8V168A8,8,0,0,0,208,160ZM88,40H48a8,8,0,0,0-8,8V88a8,8,0,0,0,16,0V56H88a8,8,0,0,0,0-16Z"></path></svg></button>
                   <button onclick="setPreview('desktop')" class="opacity-50 hover:opacity-100 transition-opacity"><svg width="16" height="16" fill="#1d1d1f" viewBox="0 0 256 256"><path d="M208,40H48A24,24,0,0,0,24,64V160a24,24,0,0,0,24,24h64v16H88a8,8,0,0,0,0,16h80a8,8,0,0,0,0-16H144V184h64a24,24,0,0,0,24-24V64A24,24,0,0,0,208,40Z"></path></svg></button>
                   <button onclick="setPreview('mobile')" class="opacity-50 hover:opacity-100 transition-opacity"><svg width="16" height="16" fill="#1d1d1f" viewBox="0 0 256 256"><path d="M176,16H80A24,24,0,0,0,56,40V216a24,24,0,0,0,24,24h96a24,24,0,0,0,24-24V40A24,24,0,0,0,176,16Z"></path></svg></button>
                </div>
            </div>
            
            <div id="preview-wrapper" class="flex-1 flex items-center justify-center overflow-hidden">
                <div id="preview-container" class="w-full h-full rounded-2xl border border-gray-200">
                    <div class="browser-header" id="browser-ui">
                        <div class="dot bg-[#ff5f56]"></div>
                        <div class="dot bg-[#ffbd2e]"></div>
                        <div class="dot bg-[#27c93f]"></div>
                    </div>
                    <div class="phone-notch" id="phone-ui"></div>
                    <iframe id="preview" class="w-full h-full border-none bg-white"></iframe>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Lógica de Autenticação Original
        function validateAuth() {
            const input = document.getElementById('passInput');
            const error = document.getElementById('error-msg');
            const overlay = document.getElementById('auth-overlay');
            const masterKey = "174510203040508";
            const database = [masterKey, "NOVASENHA01", "NOVASENHA02"];

            if(database.includes(input.value)) {
                overlay.style.opacity = '0';
                overlay.style.transform = 'translateY(-100%)';
                setTimeout(() => overlay.remove(), 600);
            } else {
                input.value = "";
                input.classList.add('shake');
                error.style.opacity = '1';
                setTimeout(() => {
                    input.classList.remove('shake');
                    error.style.opacity = '0';
                }, 1000);
            }
        }
        document.getElementById('passInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') validateAuth(); });

        // Lógica do Sistema Original
        let editor, currentLang = 'html';
        let files = {
            html: localStorage.getItem('wnet-html') || '<div class="container">\n  <h1>Design Inicial de WnetStudio</h1>\n  <p>Minimalismo e clareza.</p>\n  <button id="btn">Explorar</button>\n</div>',
            css: localStorage.getItem('wnet-css') || 'body { background: #fff; color: #1d1d1f; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, sans-serif; margin: 0; }\n.container { text-align: center; border: 1px solid #d2d2d7; padding: 3rem; border-radius: 30px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }\nbutton { background: #007aff; color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 500; cursor: pointer; margin-top: 20px; transition: 0.2s; }\nbutton:hover { opacity: 0.8; }',
            javascript: localStorage.getItem('wnet-js') || 'document.getElementById("btn").onclick = () => {\n  alert("Olá do ecossistema Wnet!");\n};'
        };

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: files[currentLang],
                language: 'html',
                theme: 'vs', // Tema claro para o estilo Apple
                automaticLayout: true,
                fontSize: 14,
                fontFamily: 'JetBrains Mono',
                minimap: { enabled: false },
                cursorBlinking: "smooth",
                renderLineHighlight: "none",
                scrollbar: { vertical: 'hidden', horizontal: 'hidden' }
            });
            editor.onDidChangeModelContent(() => { files[currentLang] = editor.getValue(); updatePreview(); });
            setTimeout(updatePreview, 500);
            setPreview('desktop');
        });

        function switchTab(lang) {
            files[currentLang] = editor.getValue();
            currentLang = lang;
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); });
            const activeTabId = lang === 'javascript' ? 'tab-js' : `tab-${lang}`;
            document.getElementById(activeTabId).classList.add('active');
            monaco.editor.setModelLanguage(editor.getModel(), lang === 'javascript' ? 'javascript' : lang);
            editor.setValue(files[lang]);
        }

        function updatePreview() {
            const frame = document.getElementById('preview');
            const source = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${files.css}</style></head><body>${files.html}<script>${files.javascript}<\/script></body></html>`;
            frame.src = URL.createObjectURL(new Blob([source], { type: 'text/html' }));
        }

        function setPreview(type) {
            const container = document.getElementById('preview-container');
            const phoneUI = document.getElementById('phone-ui');
            const browserUI = document.getElementById('browser-ui');
            if(type === 'mobile') {
                container.style.width = '375px'; container.style.height = '667px'; container.style.borderRadius = '40px'; container.style.border = '12px solid #000';
                phoneUI.style.display = 'block'; browserUI.style.display = 'none';
            } else {
                container.style.width = '100%'; container.style.height = '100%'; container.style.borderRadius = '16px'; container.style.border = '1px solid #e5e5e5';
                phoneUI.style.display = 'none'; browserUI.style.display = 'flex';
            }
        }

        function toggleFullscreen() {
            const iframe = document.getElementById('preview');
            if (iframe.requestFullscreen) iframe.requestFullscreen();
            else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
        }

        function selectAllCode() { if (editor) { editor.focus(); editor.setSelection(editor.getModel().getFullModelRange()); } }
        function clearAll() { if(confirm("Deseja limpar todo o código?")) { files.html = ""; files.css = ""; files.javascript = ""; editor.setValue(""); updatePreview(); } }
        function saveToLocal() { localStorage.setItem('wnet-html', files.html); localStorage.setItem('wnet-css', files.css); localStorage.setItem('wnet-js', files.javascript); alert("Alterações salvas no navegador."); }
        function importFile() { document.getElementById('fileInput').click(); }
        function handleImport(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const doc = new DOMParser().parseFromString(e.target.result, 'text/html');
                files.html = doc.body.innerHTML;
                files.css = doc.querySelector('style')?.innerHTML || "";
                files.javascript = doc.querySelector('script')?.innerHTML || "";
                editor.setValue(files[currentLang]); updatePreview();
            };
            reader.readAsText(event.target.files[0]);
        }

        // FUNÇÃO DE EXPORTAR ALTERADA PARA MOSTRAR O BANNER
        async function downloadBundle() {
            document.getElementById('paywall-overlay').style.display = 'flex';
        }
    </script>
</body>
</html><script>document.getElementById("btn").onclick = () => {
  alert("Olá do ecossistema Wnet!");
};</script></body></html>
