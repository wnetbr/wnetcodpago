<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WnetStudio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f5f5f7;
            --panel: rgba(255, 255, 255, 0.7);
            --accent: #007aff; 
            --border: rgba(0, 0, 0, 0.1);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
        }

        body { 
            background: var(--bg);
            color: var(--text-primary); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .apple-glass {
            background: var(--panel);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .monaco-editor, .monaco-editor .margin, .monaco-editor-background {
            background-color: transparent !important;
        }

        #preview-container {
            position: relative;
            background: #ffffff;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .phone-notch {
            display: none;
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 25px;
            background: #000;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 20;
        }

        .browser-header {
            display: none;
            height: 38px;
            background: #f1f1f1;
            border-bottom: 1px solid #e5e5e5;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        .tab-btn { 
            position: relative; 
            transition: all 0.2s ease; 
            font-size: 13px; 
            font-weight: 500;
            color: var(--text-secondary);
        }
        .tab-btn.active { color: var(--text-primary); }
        .tab-btn.active::after { 
            content: ''; 
            position: absolute; 
            bottom: -8px; left: 0; 
            width: 100%; height: 2px; 
            background: var(--text-primary); 
            border-radius: 2px; 
        }

        .btn-apple {
            background: #ffffff;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            color: #1d1d1f;
            transition: all 0.2s;
        }
        .btn-apple:hover { background: #f5f5f7; border-color: #86868b; }
        
        .btn-primary-apple {
            background: var(--accent);
            color: white;
            border-radius: 8px;
            transition: opacity 0.2s;
        }
        .btn-primary-apple:hover { opacity: 0.9; }

        #auth-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease-in-out;
        }
        .auth-card { width: 320px; text-align: center; }
        .auth-input {
            width: 100%;
            background: #f5f5f7;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            padding: 12px;
            color: #000;
            text-align: center;
            font-size: 1rem;
            margin: 24px 0;
            outline: none;
        }

        .premium-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="flex flex-col">

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="w-20 h-20 bg-black rounded-[22%] mx-auto mb-8 flex items-center justify-center shadow-xl">
                <svg width="40" height="40" viewBox="0 0 256 256" fill="white"><path d="M208,80H176V56a48,48,0,0,0-96,0V80H48A16,16,0,0,0,32,96V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V96A16,16,0,0,0,208,80ZM96,56a32,32,0,0,1,64,0V80H96ZM208,208H48V96H208V208Z"></path></svg>
            </div>
            <h2 class="text-black font-semibold text-2xl tracking-tight">Iniciar Sessão</h2>
            <p class="text-gray-500 text-sm mt-1">Digite a senha de Acesso</p>
            <input type="password" id="passInput" class="auth-input" placeholder="Senha" maxlength="20">
            <button onclick="validateAuth()" class="w-full py-3 btn-primary-apple font-medium">Entrar</button>
            <p id="error-msg" class="text-red-500 text-xs mt-4 opacity-0">Senha incorreta. Tente novamente.</p>
        </div>
    </div>

    <div id="premium-banner" class="premium-overlay">
        <div class="apple-glass p-10 rounded-[32px] text-center max-w-sm border border-white/50 shadow-2xl">
            <h3 class="text-2xl font-bold text-black mb-2">Limite Atingido</h3>
            <p class="text-gray-500 text-sm mb-8">Você atingiu o limite. Adquira a versão paga.</p>
            <div class="flex flex-col gap-3">
                <button onclick="window.open('https://wa.me/5597981107634', '_blank')" class="w-full py-3 btn-primary-apple font-semibold">Obter Versão Paga</button>
                <button onclick="closeBanner()" class="w-full py-3 text-sm font-medium text-gray-500 hover:text-black transition-colors">Voltar</button>
            </div>
        </div>
    </div>

    <header class="h-auto md:h-16 flex flex-wrap items-center justify-between px-4 md:px-8 py-3 border-b border-gray-200 z-50 apple-glass">
        <div class="flex items-center gap-6 w-full md:w-auto justify-between mb-3 md:mb-0">
            <div class="flex items-center gap-2 group cursor-pointer">
                <div class="h-7 w-7 bg-black rounded-lg flex items-center justify-center">
                    <div class="h-2 w-2 bg-white rounded-full"></div>
                </div>
                <h1 class="text-sm font-semibold tracking-tight text-black">WNET<span class="font-normal opacity-50">Studio</span></h1>
            </div>
            <nav class="flex gap-6 items-center pt-1">
                <button onclick="switchTab('html')" id="tab-html" class="tab-btn active uppercase tracking-wider">HTML</button>
                <button onclick="switchTab('css')" id="tab-css" class="tab-btn uppercase tracking-wider">CSS</button>
                <button onclick="switchTab('javascript')" id="tab-js" class="tab-btn uppercase tracking-wider">JS</button>
            </nav>
        </div>
        <div class="flex flex-wrap items-center gap-2 w-full md:w-auto justify-center md:justify-end">
            <button onclick="selectAllCode()" class="text-xs font-medium px-3 py-1.5 btn-apple">Sel.</button>
            <button onclick="clearAll()" class="text-xs font-medium px-3 py-1.5 text-red-500 hover:bg-red-50 rounded-lg transition-all">Limpar</button>
            <button onclick="importFile()" class="text-xs font-medium px-3 py-1.5 btn-apple">Imp.</button>
            <button onclick="saveToLocal()" class="text-xs font-medium px-3 py-1.5 btn-apple">Salvar</button>
            <button onclick="downloadBundle()" class="text-xs font-semibold px-4 py-1.5 btn-primary-apple">Exportar</button>
            <input type="file" id="fileInput" class="hidden" accept=".html" onchange="handleImport(event)">
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden p-5 gap-5">
        <section class="w-full md:w-[45%] apple-glass rounded-2xl flex flex-col p-2 overflow-hidden border border-gray-200">
            <div id="editor-container" class="flex-1 w-full"></div>
        </section>

        <section class="flex-1 flex flex-col gap-4">
            <div id="preview-wrapper" class="flex-1 flex items-center justify-center overflow-hidden">
                <div id="preview-container" class="w-full h-full rounded-2xl border border-gray-200">
                    <div class="browser-header" id="browser-ui"><div class="dot bg-[#ff5f56]"></div><div class="dot bg-[#ffbd2e]"></div><div class="dot bg-[#27c93f]"></div></div>
                    <div class="phone-notch" id="phone-ui"></div>
                    <iframe id="preview" class="w-full h-full border-none bg-white"></iframe>
                </div>
            </div>
        </section>
    </main>

    <script>
        // (Lógica JavaScript mantida conforme seu original)
        let exportCount = 0;
        function validateAuth() {
            const input = document.getElementById('passInput');
            const error = document.getElementById('error-msg');
            const overlay = document.getElementById('auth-overlay');
            const masterKey = "174510203040508";
            const database = [masterKey, "NOVASENHA01", "NOVASENHA02"];
            if(database.includes(input.value)) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 600);
            } else {
                input.value = ""; error.style.opacity = '1';
                setTimeout(() => error.style.opacity = '0', 1000);
            }
        }
        document.getElementById('passInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') validateAuth(); });

        let editor, currentLang = 'html';
        let files = {
            html: localStorage.getItem('wnet-html') || '<div class="container">\n  <h1>WnetStudio</h1>\n</div>',
            css: localStorage.getItem('wnet-css') || 'body { font-family: sans-serif; padding: 20px; }',
            javascript: localStorage.getItem('wnet-js') || 'console.log("Olá!");'
        };

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: files[currentLang], language: 'html', theme: 'vs', automaticLayout: true
            });
            editor.onDidChangeModelContent(() => { files[currentLang] = editor.getValue(); updatePreview(); });
            updatePreview();
        });

        function switchTab(lang) {
            files[currentLang] = editor.getValue();
            currentLang = lang;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(lang === 'javascript' ? 'tab-js' : `tab-${lang}`).classList.add('active');
            monaco.editor.setModelLanguage(editor.getModel(), lang);
            editor.setValue(files[lang]);
        }

        function updatePreview() {
            const frame = document.getElementById('preview');
            const source = `<html><head><style>${files.css}</style></head><body>${files.html}<script>${files.javascript}<\/script></body></html>`;
            frame.src = URL.createObjectURL(new Blob([source], { type: 'text/html' }));
        }

        function downloadBundle() {
            if (exportCount >= 3) { document.getElementById('premium-banner').style.display = 'flex'; return; }
            const content = `<html><head><style>${files.css}</style></head><body>${files.html}<script>${files.javascript}<\/script></body></html>`;
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([content], {type: 'text/html'})); a.download = 'projeto.html'; a.click();
            exportCount++;
        }
        
        function closeBanner() { document.getElementById('premium-banner').style.display = 'none'; }
        function selectAllCode() { editor.focus(); editor.setSelection(editor.getModel().getFullModelRange()); }
        function clearAll() { if(confirm("Limpar tudo?")) { files={html:"",css:"",javascript:""}; editor.setValue(""); updatePreview(); } }
        function saveToLocal() { localStorage.setItem('wnet-html', files.html); localStorage.setItem('wnet-css', files.css); localStorage.setItem('wnet-js', files.javascript); alert("Salvo!"); }
        function importFile() { document.getElementById('fileInput').click(); }
        function handleImport(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const doc = new DOMParser().parseFromString(ev.target.result, 'text/html');
                files.html = doc.body.innerHTML;
                editor.setValue(files.html); updatePreview();
            };
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
